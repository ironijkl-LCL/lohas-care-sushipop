const EASON_MELODY = [329.63, 349.23, 392.00, 523.25, 440.00, 392.00, 349.23, 392.00, 440.00];

function tryInitAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function startBGM() {
    if (!audioCtx) return;
    if (bgmTimer) clearInterval(bgmTimer);
    bgmTimer = setInterval(() => {
        if (isLocalGameOver() || musicUserToggled || !audioCtx) return;
        try {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(EASON_MELODY[bgmStep % EASON_MELODY.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);

function stopBGM() { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } }

    lastSoundPlayTime = rightNow;
    playSynthesizedSound(type);
}

        else if (type === 'castle_boom') {
            const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc1.type = 'triangle'; osc1.frequency.setValueAtTime(120, now); osc1.frequency.linearRampToValueAtTime(30, now + 0.5);
            osc2.type = 'sawtooth'; osc2.frequency.setValueAtTime(80, now); osc2.frequency.linearRampToValueAtTime(20, now + 0.4);
            gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
            osc1.start(now); osc2.start(now); osc1.stop(now + 0.5); osc2.stop(now + 0.5);
        } 
        else if (type === 'torii_boom') {
            let toriiChords = [523.25, 659.25, 783.99, 1046.50];
            toriiChords.forEach((f, index) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + (index * 0.03));
                gain.gain.setValueAtTime(0.15, now + (index * 0.03)); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.03)); osc.stop(now + 0.4);
            });
        } 
        else if (type === 'time_bonus') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
            gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.2);
        } 
        else if (type === 'wrong') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(60, now + 0.1);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.1);
        }
    } catch(e){}
}

function startTimer() {
    clearInterval(timerInterval);
    maxTime = Math.max(30, 90 - (currentLevel - 1) * 2); timeLeft = maxTime;
    timerInterval = setInterval(() => {
        if (isAnimating) return; 
        timeLeft -= 0.1;
        if (timeLeft <= 0) { timeLeft = 0; clearInterval(timerInterval); checkGameStatus(true); }
        timerBar.style.width = (timeLeft / maxTime) * 100 + "%";
        timerTextEl.innerText = `剩餘時間: ${Math.max(0, timeLeft).toFixed(1)} 秒`;
    }, 100);
}

function showTimeBonusEffect(cell, addedTime) {
    if (!cell) return;
    const rect = cell.getBoundingClientRect();
    let bonusText = document.createElement("div");
    bonusText.className = "time-bonus-text"; bonusText.innerText = `+${addedTime.toFixed(1)}s`;
    bonusText.style.left = (rect.left + window.scrollX + cell.offsetWidth / 2 - 25) + "px";
    bonusText.style.top = (rect.top + window.scrollY + cell.offsetHeight / 2 - 15) + "px";
    document.body.appendChild(bonusText); setTimeout(() => bonusText.remove(), 800);
}

function showComboBonusEffect(cell, textValue) {
    if (!cell) return;
    const rect = cell.getBoundingClientRect();
    let bonusText = document.createElement("div");
    bonusText.className = "combo-bonus-text"; bonusText.innerText = textValue;
    bonusText.style.left = (rect.left + window.scrollX + cell.offsetWidth / 2 - 20) + "px";
    bonusText.style.top = (rect.top + window.scrollY + cell.offsetHeight / 2 - 40) + "px";
    document.body.appendChild(bonusText); setTimeout(() => bonusText.remove(), 900);
}

function explodeEffect(r,c){
    const cell = document.getElementById(`cell-${r}-${c}`); if(!cell) return;
    const rect = cell.getBoundingClientRect();
    for(let i=0; i<4; i++){
        let p = document.createElement("div"); p.className = "particle"; p.innerText = "✨"; 
        p.style.left = (rect.left + window.scrollX + cell.offsetWidth / 2 - 10) + "px";
        p.style.top = (rect.top + window.scrollY + cell.offsetHeight / 2 - 10) + "px";
        p.style.setProperty("--x",(Math.random() * 60 - 30) + "px"); p.style.setProperty("--y",(Math.random() * 60 - 30) + "px");
        fxLayer.appendChild(p); setTimeout(()=>p.remove(),500);
    }
}

function create(){
    let g; let len = currentLevelTypes.length;
    for (let attempts=0; attempts<300; attempts++) {
        g = [];
        for(let r=0; r<SIZE; r++){
            let row=[]; for(let c=0; c<SIZE; c++) row.push(currentLevelTypes[Math.floor(Math.random()*len)]);
            g.push(row);
        }
        if (!hasMatch(g)) return g;
    }
    return g;
}

function hasMatch(g){
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(g[r][c] === CASTLE || g[r][c] === TORII) continue;
            if(c<=SIZE-3 && g[r][c] && g[r][c]===g[r][c+1] && g[r][c]===g[r][c+2]) return true;
            if(r<=SIZE-3 && g[r][c] && g[r][c]===g[r+1][c] && g[r][c]===g[r+2][c]) return true;
        }
    }
    return false;
}

function countPossibleMoves(g){
    let count = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            let dirs=[[0,1],[1,0]];
            for(let [dr,dc] of dirs){
                let nr=r+dr, nc=c+dc;
                if(nr<SIZE && nc<SIZE){
                    [g[r][c],g[nr][nc]]=[g[nr][nc],g[r][c]];
                    if(hasMatch(g)) count++;
                    [g[r][c],g[nr][nc]]=[g[nr][nc],g[r][c]]; 
                }
            }
        }
    }
    return count;
}

function generateValidGrid() {
    let g; do { g = create(); } while (countPossibleMoves(g) < 1); return g;
}

function render(){
    board.innerHTML=""; renderMission();
    grid.forEach((row,r)=>{
        row.forEach((cell,c)=>{
            let div = document.createElement("div"); div.className = "cell"; div.id = `cell-${r}-${c}`;
            div.dataset.r = r; div.dataset.c = c;
            if(last && last.r === r && last.c === c) div.classList.add("selected");
            if(cell){
                let img = document.createElement("img");
                img.className = "disk-img";
                if(cell === CASTLE) img.classList.add("castle_3d_anim");
                if(cell === TORII) img.classList.add("torii_3d_anim");
                img.src = MASTER_ITEMS[cell].url;
                img.onerror = function() {
                    img.style.display = "none";
                    let textSpan = document.createElement("span");
                    textSpan.className = "disk-fallback-text";
                    textSpan.innerText = MASTER_ITEMS[cell].text;
                    div.appendChild(textSpan);
                };
                div.appendChild(img);
            }
            board.appendChild(div);
        });
    });
}

// 5️⃣ 智能提示引導機制：找出合法的一步並高亮閃爍
function clearAutoHints() {
    activeHintCells.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.classList.remove("auto-hint-flash");
    });
    activeHintCells = [];
}

function triggerSearchAndShowHint() {
    if (isAnimating || isLocalGameOver()) return;
    clearAutoHints();
    
    // 遍歷全格尋找可移動解
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            let dirs=[[0,1],[1,0]];
            for(let [dr,dc] of dirs){
                let nr=r+dr, nc=c+dc;
                if(nr<SIZE && nc<SIZE){
                    [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]];
                    let canEliminate = hasMatch(grid);
                    [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]]; // 復原
                    
                    if(canEliminate) {
                        let id1 = `cell-${r}-${c}`;
                        let id2 = `cell-${nr}-${nc}`;
                        let el1 = document.getElementById(id1);
                        let el2 = document.getElementById(id2);
                        if(el1 && el2) {
                            el1.classList.add("auto-hint-flash");
                            el2.classList.add("auto-hint-flash");
                            activeHintCells.push(id1, id2);
                            return; // 唯獨提示一組最優解
                        }
                    }
                }
            }
        }
    }
}

function resetUserInactivityTimer() {
    userLastActiveTime = Date.now();
    clearAutoHints();
}

// 定時巡檢長者是否卡死
clearInterval(hintCheckInterval);
hintCheckInterval = setInterval(() => {
    if(Date.now() - userLastActiveTime > 5000) { // 💡 如果長者閒置超過 5 秒
        triggerSearchAndShowHint(); // 觸發自動高亮提示
    }
}, 1000);


let startCell = null, isSwapping = false;
board.addEventListener("pointerdown", e => {
    resetUserInactivityTimer();
    if(isAnimating || isSwapping || isLocalGameOver()) return;
    startCell = e.target.closest(".cell");
});
board.addEventListener("pointermove", e => {
    if(!startCell || isAnimating || isSwapping) return;
    let targetEl = document.elementFromPoint(e.clientX, e.clientY);
    let currentCell = targetEl ? targetEl.closest(".cell") : null;
    if(!currentCell || startCell === currentCell) return;

    let r1 = parseInt(startCell.dataset.r), c1 = parseInt(startCell.dataset.c);
    let r2 = parseInt(currentCell.dataset.r), c2 = parseInt(currentCell.dataset.c);
    
    if(Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1) {
        isSwapping = true; startCell = null; 
        executeUserMove(r1, c1, r2, c2);
    }
});

function executeUserMove(r1, c1, r2, c2) {
    isAnimating = true;
    clearAutoHints();
    
    if(grid[r1][c1] === TORII || grid[r2][c2] === TORII) {
        let matchTarget = (grid[r1][c1] === TORII) ? grid[r2][c2] : grid[r1][c1];
        [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
        render();
        setTimeout(() => { triggerToriiClear(r1, c1, matchTarget); }, 150);
        return;
    }

    [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
    render();

    setTimeout(() => {
        currentComboCount = 1; 
        let success = checkMatchesAndEliminate(r2, c2); 
        if(!success) {
            [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
            safePlaySound('wrong'); 
            isAnimating = false; isSwapping = false; last = null; render();
        } else {
            moves--;
            document.getElementById("moves").innerText = moves;
            last = null; isSwapping = false;
        }
    }, 200);
}

function triggerToriiClear(toriiR, toriiC, targetColor) {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    toRemove[toriiR][toriiC] = true;
    
    if(!targetColor || targetColor === CASTLE || targetColor === TORII) {
        targetColor = currentLevelTypes[Math.floor(Math.random() * currentLevelTypes.length)];
    }

    for(let r=0; r<SIZE; r++) {
        for(let c=0; c<SIZE; c++) {
            if(grid[r][c] === targetColor) toRemove[r][c] = true;
        }
    }
    
    let targetCell = document.getElementById(`cell-${toriiR}-${toriiC}`);
    showComboBonusEffect(targetCell, "⛩️ 鳥居結界！同色全消");
    safePlaySound('torii_boom'); 
    executeElimination(toRemove);
    moves--;
    document.getElementById("moves").innerText = moves;
    isSwapping = false;
}

function checkMatchesAndEliminate(movedR = -1, movedC = -1) {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    let hasMatchFound = false;
    let spawnSpecialList = [];
    let hasCastleTriggered = false;

    // 1. 橫向
    for(let r=0; r<SIZE; r++){
        let matchLen = 1;
        let matchStart = 0;
        for(let c=1; c<SIZE; c++){
            if(grid[r][c] && grid[r][c] === grid[r][c-1] && grid[r][c] !== CASTLE && grid[r][c] !== TORII) {
                matchLen++;
            } else {
                if(matchLen >= 3) {
                    hasMatchFound = true;
                    let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
                    let spawnC = (movedR === r && movedC >= matchStart && movedC < c) ? movedC : matchStart;
                    for(let i=matchStart; i<c; i++) toRemove[r][i] = true;
                    if(type) spawnSpecialList.push({r: r, c: spawnC, type: type});
                }
                matchLen = 1;
                matchStart = c;
            }
        }
        if(matchLen >= 3) {
            hasMatchFound = true;
            let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
            let spawnC = (movedR === r && movedC >= matchStart) ? movedC : matchStart;
            for(let i=matchStart; i<SIZE; i++) toRemove[r][i] = true;
            if(type) spawnSpecialList.push({r: r, c: spawnC, type: type});
        }
    }

    // 2. 縱向
    for(let c=0; c<SIZE; c++){
        let matchLen = 1;
        let matchStart = 0;
        for(let r=1; r<SIZE; r++){
            if(grid[r][c] && grid[r][c] === grid[r-1][c] && grid[r][c] !== CASTLE && grid[r][c] !== TORII) {
                matchLen++;
            } else {
                if(matchLen >= 3) {
                    hasMatchFound = true;
                    let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
                    let spawnR = (movedC === c && movedR >= matchStart && movedR < r) ? movedR : matchStart;
                    for(let i=matchStart; i<r; i++) toRemove[i][c] = true;
                    if(type) spawnSpecialList.push({r: spawnR, c: c, type: type});
                }
                matchLen = 1;
                matchStart = r;
            }
        }
        if(matchLen >= 3) {
            hasMatchFound = true;
            let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
            let spawnR = (movedC === c && movedR >= matchStart) ? movedR : matchStart;
            for(let i=matchStart; i<SIZE; i++) toRemove[i][c] = true;
            if(type) spawnSpecialList.push({r: spawnR, c: c, type: type});
        }
    }

    // 3. 🏯 江戶古城 十字鏈式爆破
    let checkedSpecial = true;
    while(checkedSpecial) {
        checkedSpecial = false;
        for(let r=0; r<SIZE; r++) {
            for(let c=0; c<SIZE; c++) {
                if(toRemove[r][c] && grid[r][c] === CASTLE) {
                    hasCastleTriggered = true;
                    for(let i=0; i<SIZE; i++) {
                        if(!toRemove[r][i]) { toRemove[r][i] = true; checkedSpecial = true; }
                        if(!toRemove[i][c]) { toRemove[i][c] = true; checkedSpecial = true; }
                    }
                }
            }
        }
    }

    if(hasMatchFound){
        if(hasCastleTriggered) {
            safePlaySound('castle_boom');
        } else {
            safePlaySound('match');
        }
        executeElimination(toRemove, spawnSpecialList);
        return true;
    }
    return false;
}

function executeElimination(toRemove, spawnSpecialList = []) {
    let removedCount = 0;
    let targetCellEl = null;

    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(toRemove[r][c] && grid[r][c]) {
                explodeEffect(r, c);
                if(!targetCellEl) targetCellEl = document.getElementById(`cell-${r}-${c}`);
                if(grid[r][c] === targetKey1 && mission[targetKey1] > 0) mission[targetKey1]--;
                if(grid[r][c] === targetKey2 && mission[targetKey2] > 0) mission[targetKey2]--;
                grid[r][c] = null; 
                removedCount++;
            }
        }
    }

    spawnSpecialList.forEach(item => {
        grid[item.r][item.c] = item.type;
        let cellSpan = document.getElementById(`cell-${item.r}-${item.c}`);
        if(item.type === CASTLE) { showComboBonusEffect(cellSpan, "🏯 獲得古城!"); safePlaySound('time_bonus'); }
        if(item.type === TORII) { showComboBonusEffect(cellSpan, "⛩️ 獲得鳥居!"); safePlaySound('time_bonus'); }
    });

    let addedTime = 2.0; 
    if(spawnSpecialList.length > 0) addedTime = 5.0; 
    timeLeft = Math.min(maxTime, timeLeft + addedTime); 
    if(targetCellEl) {
        showTimeBonusEffect(targetCellEl, addedTime);
        if(currentComboCount > 1) safePlaySound('time_bonus');
    }

    // 3️⃣ 優化 Combo 計分公式：爽快有感且能精準平衡得分，避免爆炸式超標破壞平衡
    score += removedCount * (80 + currentComboCount * 40);
    document.getElementById("score").innerText = score;
    setTimeout(drop, 250);
}

function autoCheckLoop() {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    let hasMatchFound = false;
    for(let r=0; r<SIZE; r++){
      let cnt = 1;
      for(let c=1; c<SIZE; c++){
        if(grid[r][c] && grid[r][c] === grid[r][c-1]) cnt++;
        else { if(cnt >= 3) hasMatchFound=true; cnt = 1; }
      }
      if(cnt >= 3) hasMatchFound=true;
    }
    if(hasMatchFound) {
        currentComboCount++; 
        checkMatchesAndEliminate();
    } else {
        isAnimating = false; 
        checkGameStatus(false);
        if(countPossibleMoves(grid) < 1 && !isLocalGameOver()) {
            grid = generateValidGrid(); render();
        }
    }
}

function drop(){
    let len = currentLevelTypes.length;
    for(let c=0; c<SIZE; c++) {
        let pointer = SIZE - 1;
        for(let r=SIZE-1; r>=0; r--) {
            if(grid[r][c] !== null) { grid[pointer][c] = grid[r][c]; pointer--; }
        }
        while(pointer >= 0) {
            grid[pointer][c] = currentLevelTypes[Math.floor(Math.random() * len)];
            pointer--;
        }
    }
    render();
    
    setTimeout(() => {
        let matched = checkMatchesAndEliminate();
        if(matched) {
            currentComboCount++; 
        } else {
            isAnimating = false; 
            checkGameStatus(false);
            if(countPossibleMoves(grid) < 1 && !isLocalGameOver()) {
                grid = generateValidGrid(); render();
            }
        }
    }, 200);
}

function renderMission() {
    const missionEl = document.getElementById("mission");
    if(!targetKey1 || !targetKey2) return;
    missionEl.innerHTML = `
        🎯 目標：
        <span class="mission-icon" style="background-image:url('${MASTER_ITEMS[targetKey1].url}')">${MASTER_ITEMS[targetKey1].text}</span> 剩餘: ${mission[targetKey1]} ｜ 
        <span class="mission-icon" style="background-image:url('${MASTER_ITEMS[targetKey2].url}')">${MASTER_ITEMS[targetKey2].text}</span> 剩餘: ${mission[targetKey2]}
    `;
}

function checkGameStatus(timeOut = false) {
    if (mission[targetKey1] <= 0 && mission[targetKey2] <= 0) {
        clearInterval(timerInterval); currentLevel++; setupLevel(); return;
    } 
    if (moves <= 0 || timeOut) {
        clearInterval(timerInterval); stopBGM();
        document.getElementById("gameOverModal").style.display = "flex";
        uploadScoreToFirebase();
    }
}

function restartWholeGame() { document.getElementById("gameOverModal").style.display = "none"; currentLevel = 1; score = 0; document.getElementById("score").innerText = score; setupLevel(); }
function returnToGameHome() { document.getElementById("gameOverModal").style.display = "none"; currentLevel = 1; score = 0; setupLevel(); }

function updateRescueUI() {
    rescueIconsEl.innerHTML = "";
    if(rescueMovesLeft <= 0) {
        rescueIconsEl.innerText = "次數用盡 ❌";
        rescueIconsEl.style.color = "#e74c3c";
        ambulanceBtn.disabled = true;
        return;
    }
    
    for(let i=0; i<rescueMovesLeft; i++) {
        let span = document.createElement("span");
        span.className = "rescue-count-icon";
        span.style.position = "relative";
        span.innerHTML = `<span style="font-size:20px; font-weight:normal; line-height:24px;">🎋</span>`;
        
        let imgTest = new Image();
        imgTest.src = 'https://img.icons8.com/color/96/tanabata-tree.png';
        imgTest.onload = function() {
            span.style.backgroundImage = "url('https://img.icons8.com/color/96/tanabata-tree.png')";
            span.innerHTML = ""; 
        };
        rescueIconsEl.appendChild(span);
    }
}

function useAmbulanceRescue() {
    resetUserInactivityTimer();
    if(rescueMovesLeft <= 0 || isAnimating || isLocalGameOver()) return;
    rescueMovesLeft--; 
    updateRescueUI(); 
    safePlaySound('torii_boom'); 
    grid = generateValidGrid(); 
    render();
}

function setupLevel() {
    let poolSize = currentLevel >= 15 ? 9 : (currentLevel >= 6 ? 7 : 5);
    let allKeys = Object.keys(MASTER_ITEMS); 
    let cleanPool = allKeys.filter(k => k !== CASTLE && k !== TORII);
    cleanPool.sort(() => 0.5 - Math.random()); 
    currentLevelTypes = cleanPool.slice(0, poolSize); 
    
    targetKey1 = currentLevelTypes[0]; targetKey2 = currentLevelTypes[1];
    let targetCount = Math.min(30, 8 + Math.floor(currentLevel / 2));
    mission = { [targetKey1]: targetCount, [targetKey2]: targetCount };
    
    moves = Math.min(50, 35 + Math.floor(currentLevel / 5));
    document.getElementById("moves").innerText = moves;
    document.getElementById("current-level").innerText = currentLevel;
    
    isAnimating = false; isSwapping = false; last = null;
    rescueMovesLeft = 3; 
    ambulanceBtn.disabled = false;
    updateRescueUI();
    resetUserInactivityTimer();
    
    grid = generateValidGrid(); render(); startTimer(); 
    tryInitAudio();
    if(audioCtx && !musicUserToggled) startBGM();
}

function uploadScoreToFirebase() {
    let name = prompt("🍣 請輸入您的長者暱稱：", "精明老饕");
    if (name === null) name = "無名傳奇"; name = name.trim() === "" ? "精明老饕" : name;
    database.ref("leaderboard").push({ name: name, level: currentLevel, score: score, timestamp: Date.now() });
}

function showLeaderboardPopup() { 
    const tbody = document.getElementById("leaderboard-body"); tbody.innerHTML = `<tr><td colspan="4">數據加載中...</td></tr>`;
    document.getElementById("rankModal").style.display = "flex";
    database.ref("leaderboard").orderByChild("score").limitToLast(10).once("value", snapshot => {
        let list = []; snapshot.forEach(child => { list.push(child.val()); }); 
        
        // 2️⃣ 排行榜防混亂雙重保險排序邏輯優化
        list.sort((a,b) => b.score - a.score); 
        
        tbody.innerHTML = "";
        list.forEach((player, index) => {
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${index + 1}</td><td>${player.name}</td><td>第 ${player.level} 關</td><td style="color:#d35400;">${player.score}</td>`;
            tbody.appendChild(tr);
        });
    });
}
function closeLeaderboardPopup() { document.getElementById("rankModal").style.display = "none"; }
