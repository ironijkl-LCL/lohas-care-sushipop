<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sushi Pop 壽司彈彈樂 VIP ✨</title>

<style>
body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden; 
}

/* 🎯 終極鎖死排版防線：固定卡片與棋盤寬高，任何情況下都絕不拉伸 */
.container {
    width: 380px;
    height: 600px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    padding: 15px;
    text-align: center;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative; 
}

h1 {
    font-size: 22px;
    color: #ff6b6b;
    margin: 0;
    padding: 0;
}

.level {
    margin: 2px 0;
    font-weight: bold;
    color: #4a3728;
    font-size: 15px;
}

.stats {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    gap: 6px;
}

.stat-box {
    background: #f7f7f7;
    border-radius: 12px;
    padding: 6px;
    width: 23%;
    font-size: 12px;
    font-weight: bold;
    color: #4a3728;
    box-sizing: border-box;
}

#score {
    display: inline-block;
    transition: transform 0.1s ease;
}

.timer-container {
    width: 100%;
    background: #eddcc9; 
    height: 10px;
    border-radius: 5px;
    margin: 4px 0;
    overflow: hidden;
    position: relative;
    border: 1px solid #4a3728;
    box-sizing: border-box;
}
.timer-bar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ff4d4d); 
    transition: width 0.1s linear;
}

/* 🎯 廚房急單高度精準鎖死 40px */
#mission {
    background: #fff7e6;
    border-radius: 12px;
    padding: 0 5px;
    margin: 4px 0;
    font-size: 13px;
    font-weight: bold;
    color: #2c3e50;
    border: 1px solid #f1c40f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 40px; 
    max-height: 40px;
    min-height: 40px;
    overflow: hidden;
    box-sizing: border-box;
}

/* 🎯 Combo 貼紙完全絕對定位，不佔用任何文檔物理空間，防抖動 */
.combo-floating-badge {
    position: absolute;
    top: 72px; 
    right: 15px;
    background: linear-gradient(135deg, #ff4d4d, #ff6b6b);
    color: white;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 900;
    box-shadow: 0 4px 8px rgba(255,61,61,0.3);
    z-index: 999;
    pointer-events: none;
    transition: opacity 0.1s ease, transform 0.1s ease;
    opacity: 0;
    transform: scale(0.8);
}
.combo-active {
    opacity: 1;
    transform: scale(1);
}

.btn-ambulance {
    background: linear-gradient(135deg, #a2ebd2, #8edeb4); 
    color: #27ae60; 
    border: 2px solid #27ae60; 
    padding: 0 8px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 6px;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    box-sizing: border-box;
    height: 36px;
    min-height: 36px;
}
.btn-ambulance:disabled { background: #95a5a6 !important; border: none; cursor: not-allowed; opacity: 0.6; color: #fff !important; }

button:active {
    transform: scale(0.95);
    filter: brightness(0.9);
}

.board-container {
    width: 100%;
    margin: 4px auto 0 auto;
    touch-action: none !important; 
    box-sizing: border-box;
    display: flex;
    justify-content: center;
}

/* 🎯 棋盤高寬硬寫死 350px 完美正方形，純白底色讓任何裂縫消失 */
.board {
    display: grid;
    grid-template-columns: repeat(8, 1fr); 
    gap: 4px; 
    background: #ffffff; 
    padding: 6px;
    border-radius: 16px;
    border: 3px solid #4a3728;
    touch-action: none !important; 
    overflow: hidden;
    box-sizing: border-box;
    width: 350px; 
    height: 350px; 
}

.cell {
    width: 100%;
    height: 100%;
    background: #fdfdfd;
    border-radius: 18%;
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1), inset 0 0 4px rgba(0,0,0,0.05);
    box-sizing: border-box;
    touch-action: none !important;
    display: flex;
    align-items: center;
    justify-content: center;
}

.selected {
    border: 3px solid #e74c3c !important;
    background: #fff0f0 !important;
}

.auto-hint-flash {
    border: 2px solid #f1c40f !important;
    background-color: #fef5c8 !important;
    z-index: 10;
}

.disk-emoji {
    font-size: 26px;
    line-height: 1;
    pointer-events: none;
}

.cell-castle {
    border: 3px solid #d35400 !important;
    background-color: #fff5e6 !important;
}
.cell-torii {
    border: 3px solid #c0392b !important;
    background-color: #ffe6e6 !important;
}

.game-over-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    justify-content: center;
    align-items: center;
}
.game-over-content {
    background: white;
    width: 85%;
    max-width: 340px;
    border-radius: 20px;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
}

.fail-box {
    background: #ffe6e6;
    border-radius: 12px;
    padding: 15px;
    margin: 15px 0;
    text-align: left;
}
.fail-box p { margin: 6px 0; font-weight: bold; color: #4a3728; }
.highlight { color: #ff4d4d; font-weight: bold; }

button.menu-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    box-sizing: border-box;
    display: block;
    transition: transform 0.1s ease;
}
.retry { background: #ff6b6b; color: white; }
.home { background: #ddd; color: #4a3728; }

.time-bonus-text, .combo-bonus-text {
    position: absolute;
    font-weight: 900;
    pointer-events: none;
    z-index: 1005;
    animation: floatUpUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}
.time-bonus-text { color: #2ecc71; font-size: 18px; text-shadow: 1px 1px 0px #fff; }
.combo-bonus-text { color: #e67e22; font-size: 19px; text-shadow: 1px 1px 0px #fff; }
@keyframes floatUpUp {
    0% { transform: translate(0, 0); opacity: 1; }
    100% { transform: translate(0, -35px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <div id="combo-badge" class="combo-floating-badge">🔥 COMBO x2</div>

    <h1>🍣 Sushi Pop 壽司彈彈樂 VIP ✨</h1>
    <div style="font-size:12px; color:#999; margin-bottom: 2px;">全港熱玩🔥 3秒上手・停不下來！</div>
    
    <div class="level">第 <span id="current-level">1</span> / 100 關</div>

    <div class="stats">
        <div class="stat-box">⏳ 時間<br><span id="timer-text">90s</span></div>
        <div class="stat-box">👣 步數<br><span id="moves">35</span></div>
        <div class="stat-box">🏆 得分<br><span id="score">0</span></div>
        <div class="stat-box" style="cursor:pointer;" onclick="toggleMusic()">🎵 音樂<br><span id="music-status">開啟</span></div>
    </div>

    <div class="timer-container">
        <div id="timer-bar" class="timer-bar"></div>
    </div>

    <div id="mission">🔥 廚房急單！載入中...</div>

    <button id="ambulance-btn" class="btn-ambulance" onclick="useAmbulanceRescue()">
        ⚡ 緊急整理技能：<span id="rescue-icons">剩 3 次</span>
    </button>

    <div class="board-container">
        <div id="board" class="board"></div>
    </div>
</div>

<div id="gameOverModal" class="game-over-modal">
    <div class="game-over-content">
        <div class="fail-box">
            <h3 style="margin-top:0; color:#ff6b6b; text-align:center;">💥 訂單爆單失敗！</h3>
            <p id="go-reason-text">💸 步數耗盡！差一點就完成！</p>
            <p>卡關：<span id="go-level-val">第 1 關</span></p>
            <p class="highlight">最終分數：<span id="go-score-val">0</span> 分</p>
        </div>
        
        <button class="menu-btn" style="background:#2ecc71; color:white;" onclick="watchAdRevive()">
            ❤️ 看廣告繼續一次 (差一點點！)
        </button>
        <button class="menu-btn retry" onclick="restartWholeGame()">🔄 再挑戰一次（差一點就過！）</button>
        <button class="menu-btn home" onclick="returnToGameHome()">🏠 返回首頁</button>
    </div>
</div>

<script>
const SIZE = 8;
const CASTLE = "japanese_castle";
const TORII = "torii_gate";

const MASTER_ITEMS = {
    "japanese_castle": { text: "🏯" },
    "torii_gate": { text: "⛩️" },
    "salmon_sushi": { text: "🍣" },
    "prawn_sushi": { text: "🍤" },
    "fish_rice": { text: "🍙" },
    "temaki": { text: "🌯" }, 
    "fish_plate": { text: "🐟" },
    "octopus": { text: "🐙" },
    "crab_claw": { text: "🦀" },
    "green_tea": { text: "🍵" },
    "bento": { text: "🍱" },
    "dumpling": { text: "🥟" }
};

let currentLevelTypes = [], grid = [], score = 0, last = null, isAnimating = false;
let currentLevel = 1, moves = 35, maxTime = 90, timeLeft = 90, timerInterval = null, musicUserToggled = false, currentComboCount = 1; 
let rescueMovesLeft = 3; 
let mission = {}, targetKey1 = "", targetKey2 = "";

let userLastActiveTime = Date.now();
let hintCheckInterval = null;
let activeHintCells = [];

const board = document.getElementById("board");
const timerBar = document.getElementById("timer-bar");
const timerTextEl = document.getElementById("timer-text");
const ambulanceBtn = document.getElementById("ambulance-btn");
const rescueIconsEl = document.getElementById("rescue-icons");
const comboBadge = document.getElementById("combo-badge");

function isLocalGameOver() { return moves <= 0 || timeLeft <= 0; }

let audioCtx = null, bgmTimer = null, bgmStep = 0;
const EASON_MELODY = [329.63, 349.23, 392.00, 523.25, 440.00, 392.00, 349.23, 392.00, 440.00];

function tryInitAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function startBGM() {
    if (!audioCtx) return;
    if (bgmTimer) clearInterval(bgmTimer);
    document.getElementById("music-status").innerText = "開啟";
    bgmTimer = setInterval(() => {
        if (isLocalGameOver() || musicUserToggled || !audioCtx) return;
        try {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(EASON_MELODY[bgmStep % EASON_MELODY.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
            osc.start(); osc.stop(audioCtx.currentTime + 0.22); bgmStep++;
        } catch(e){}
    }, 280);
}
function stopBGM() { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } document.getElementById("music-status").innerText = "關閉"; }
function toggleMusic(){ tryInitAudio(); if(bgmTimer === null) { musicUserToggled = false; startBGM(); } else { stopBGM(); musicUserToggled = true; } }

function safePlaySound(type) {
    tryInitAudio();
    if (!audioCtx || musicUserToggled) return;
    try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        if (type === 'match') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25 * (1 + (currentComboCount - 1) * 0.1), now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        } else if (type === 'boom') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(40, now + 0.4);
            gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
        }
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now + 0.4);
    } catch(e){}
}

function startTimer() {
    clearInterval(timerInterval);
    maxTime = Math.max(30, 90 - (currentLevel - 1) * 2); timeLeft = maxTime;
    timerInterval = setInterval(() => {
        if (isAnimating) return; 
        timeLeft -= 0.1;
        if (timeLeft <= 0) { timeLeft = 0; clearInterval(timerInterval); checkGameStatus(true); }
        timerBar.style.width = (timeLeft / maxTime) * 100 + "%";
        timerTextEl.innerText = `${Math.max(0, timeLeft).toFixed(0)}s`;
    }, 100);
}

function showBonusEffect(cell, text, isCombo = false) {
    if (!cell) return;
    const rect = cell.getBoundingClientRect();
    let bonusText = document.createElement("div");
    bonusText.className = isCombo ? "combo-bonus-text" : "time-bonus-text"; 
    bonusText.innerText = text;
    bonusText.style.left = (rect.left + window.scrollX + cell.offsetWidth / 2 - 20) + "px";
    bonusText.style.top = (rect.top + window.scrollY + cell.offsetHeight / 2 - 15) + "px";
    document.body.appendChild(bonusText); setTimeout(() => bonusText.remove(), 800);
}

function create(){
    let g; let len = currentLevelTypes.length;
    for (let attempts=0; attempts<300; attempts++) {
        g = [];
        for(let r=0; r<SIZE; r++){
            let row=[]; for(let c=0; c<SIZE; c++) row.push(currentLevelTypes[Math.floor(Math.random()*len)]);
            g.push(row);
        }
        if (!hasMatch(g)) return g;
    }
    return g;
}

function hasMatch(g){
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(g[r][c] === CASTLE || g[r][c] === TORII) continue;
            if(c<=SIZE-3 && g[r][c] && g[r][c]===g[r][c+1] && g[r][c]===g[r][c+2]) return true;
            if(r<=SIZE-3 && g[r][c] && g[r][c]===g[r+1][c] && g[r][c]===g[r+2][c]) return true;
        }
    }
    return false;
}

function countPossibleMoves(g){
    let count = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            let dirs=[[0,1],[1,0]];
            for(let [dr,dc] of dirs){
                let nr=r+dr, nc=c+dc;
                if(nr<SIZE && nc<SIZE){
                    [g[r][c],g[nr][nc]]=[g[nr][nc],g[r][c]];
                    if(hasMatch(g)) count++;
                    [g[r][c],g[nr][nc]]=[g[nr][nc],g[r][c]]; 
                }
            }
        }
    }
    return count;
}

function generateValidGrid() {
    let g; do { g = create(); } while (countPossibleMoves(g) < 1); return g;
}

function render(){
    board.innerHTML=""; renderMission();
    grid.forEach((row,r)=>{
        row.forEach((cell,c)=>{
            let div = document.createElement("div"); div.className = "cell"; div.id = `cell-${r}-${c}`;
            div.dataset.r = r; div.dataset.c = c;
            if(last && last.r === r && last.c === c) div.classList.add("selected");
            if(cell){
                if(cell === CASTLE) div.classList.add("cell-castle");
                if(cell === TORII) div.classList.add("cell-torii");
                let span = document.createElement("span");
                span.className = "disk-emoji";
                span.innerText = MASTER_ITEMS[cell].text;
                div.appendChild(span);
            }
            board.appendChild(div);
        });
    });
}

function clearAutoHints() {
    activeHintCells.forEach(id => { document.getElementById(id)?.classList.remove("auto-hint-flash"); });
    activeHintCells = [];
}

function triggerSearchAndShowHint() {
    if (isAnimating || isLocalGameOver()) return;
    clearAutoHints();
    let bestMove = null; let bestScore = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            let dirs=[[0,1],[1,0]];
            for(let [dr,dc] of dirs){
                let nr=r+dr, nc=c+dc;
                if(nr<SIZE && nc<SIZE){
                    [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]];
                    let scoreEstimate = estimateMatchScore(grid);
                    [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]]; 
                    if(scoreEstimate > bestScore){ bestScore = scoreEstimate; bestMove = {r, c, nr, nc}; }
                }
            }
        }
    }
    if(bestMove){
        let id1 = `cell-${bestMove.r}-${bestMove.c}`, id2 = `cell-${bestMove.nr}-${bestMove.nc}`;
        document.getElementById(id1)?.classList.add("auto-hint-flash");
        document.getElementById(id2)?.classList.add("auto-hint-flash");
        activeHintCells.push(id1, id2);
    }
}

// 🎯 核心修正：將此處橫向判斷死循環中的 r++ 修改為 c++，100% 杜絕執行緒卡死！
function estimateMatchScore(g){
    let count = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE-2; c++){ if(g[r][c] && g[r][c] === g[r][c+1] && g[r][c] === g[r][c+2]) count += 3; }
    }
    for(let c=0; c<SIZE; c++){
        for(let r=0; r<SIZE-2; r++){ if(g[r][c] && g[r][c] === g[r+1][c] && g[r][c] === g[r+2][c]) count += 3; }
    }
    return count;
}

function resetUserInactivityTimer() { userLastActiveTime = Date.now(); clearAutoHints(); }
clearInterval(hintCheckInterval);
hintCheckInterval = setInterval(() => { if(Date.now() - userLastActiveTime > 5000) triggerSearchAndShowHint(); }, 1000);

board.addEventListener("pointerdown", e => {
    tryInitAudio(); resetUserInactivityTimer();
    if(isAnimating || isLocalGameOver()) return;
    last = e.target.closest(".cell");
});

board.addEventListener("pointermove", e => {
    if(!last || isAnimating) return;
    let targetEl = document.elementFromPoint(e.clientX, e.clientY);
    let currentCell = targetEl ? targetEl.closest(".cell") : null;
    if(!currentCell || last === currentCell) return;

    let r1 = parseInt(last.dataset.r), c1 = parseInt(last.dataset.c);
    let r2 = parseInt(currentCell.dataset.r), c2 = parseInt(currentCell.dataset.c);
    
    if(Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1) {
        isAnimating = true; last = null;
        executeUserMove(r1, c1, r2, c2);
    }
});

function executeUserMove(r1, c1, r2, c2) {
    clearAutoHints();
    
    if(grid[r1][c1] === TORII || grid[r2][c2] === TORII) {
        let toriiR = grid[r1][c1] === TORII ? r1 : r2;
        let toriiC = grid[r1][c1] === TORII ? c1 : c2;
        let targetColor = grid[r1][c1] === TORII ? grid[r2][c2] : grid[r1][c1];
        
        [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
        render();
        setTimeout(() => { triggerToriiClear(toriiR, toriiC, targetColor); }, 150);
        return;
    }

    [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
    render();

    setTimeout(() => {
        currentComboCount = 1; 
        let success = checkMatchesAndEliminate(r2, c2); 
        if(!success) {
            [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
            safePlaySound('wrong'); isAnimating = false; render();
        } else {
            moves--; document.getElementById("moves").innerText = moves;
        }
    }, 200);
}

function triggerToriiClear(toriiR, toriiC, targetColor) {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    toRemove[toriiR][toriiC] = true;
    
    if(targetColor && targetColor !== CASTLE && targetColor !== TORII) {
        for(let r=0; r<SIZE; r++) {
            for(let c=0; c<SIZE; c++) { if(grid[r][c] === targetColor) toRemove[r][c] = true; }
        }
    }
    let targetCell = document.getElementById(`cell-${toriiR}-${toriiC}`);
    showBonusEffect(targetCell, "⛩️ 鳥居全消！", true);
    safePlaySound('boom');
    executeElimination(toRemove);
    moves--; document.getElementById("moves").innerText = moves;
}

function checkMatchesAndEliminate(movedR = -1, movedC = -1) {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    let hasMatchFound = false;
    let spawnSpecialList = [];
    let hasCastleTriggered = false;

    for(let r=0; r<SIZE; r++){
        let matchLen = 1; let matchStart = 0;
        for(let c=1; c<SIZE; c++){
            if(grid[r][c] && grid[r][c] === grid[r][c-1] && grid[r][c] !== CASTLE && grid[r][c] !== TORII) matchLen++;
            else {
                if(matchLen >= 3) {
                    hasMatchFound = true;
                    let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
                    let spawnC = (movedR === r && movedC >= matchStart && movedC < c) ? movedC : matchStart;
                    for(let i=matchStart; i<c; i++) toRemove[r][i] = true;
                    if(type) spawnSpecialList.push({r: r, c: spawnC, type: type});
                }
                matchLen = 1; matchStart = c;
            }
        }
        if(matchLen >= 3) {
            hasMatchFound = true;
            let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
            let spawnC = (movedR === r && movedC >= matchStart) ? movedC : matchStart;
            for(let i=matchStart; i<SIZE; i++) toRemove[r][i] = true;
            if(type) spawnSpecialList.push({r: r, c: spawnC, type: type});
        }
    }

    for(let c=0; c<SIZE; c++){
        let matchLen = 1; let matchStart = 0;
        for(let r=1; r<SIZE; r++){
            if(grid[r][c] && grid[r][c] === grid[r-1][c] && grid[r][c] !== CASTLE && grid[r][c] !== TORII) matchLen++;
            else {
                if(matchLen >= 3) {
                    hasMatchFound = true;
                    let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
                    let spawnR = (movedC === c && movedR >= matchStart && movedR < r) ? movedR : matchStart;
                    for(let i=matchStart; i<r; i++) toRemove[i][c] = true;
                    if(type) spawnSpecialList.push({r: spawnR, c: c, type: type});
                }
                matchLen = 1; matchStart = r;
            }
        }
        if(matchLen >= 3) {
            hasMatchFound = true;
            let type = (matchLen === 4) ? CASTLE : (matchLen >= 5 ? TORII : null);
            let spawnR = (movedC === c && movedR >= matchStart) ? movedR : matchStart;
            for(let i=matchStart; i<SIZE; i++) toRemove[i][c] = true;
            if(type) spawnSpecialList.push({r: spawnR, c: c, type: type});
        }
    }

    let checkedSpecial = true;
    while(checkedSpecial) {
        checkedSpecial = false;
        for(let r=0; r<SIZE; r++) {
            for(let c=0; c<SIZE; c++) {
                if(toRemove[r][c] && grid[r][c] === CASTLE) {
                    hasCastleTriggered = true;
                    for(let i=0; i<SIZE; i++) {
                        if(!toRemove[r][i]) { toRemove[r][i] = true; checkedSpecial = true; }
                        if(!toRemove[i][c]) { toRemove[i][c] = true; checkedSpecial = true; }
                    }
                }
            }
        }
    }

    if(hasMatchFound){
        if(hasCastleTriggered) { safePlaySound('boom'); } else { safePlaySound('match'); }
        executeElimination(toRemove, spawnSpecialList);
        return true;
    }
    return false;
}

function executeElimination(toRemove, spawnSpecialList = []) {
    let removedCount = 0; let targetCellEl = null;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(toRemove[r][c] && grid[r][c]) {
                if(!targetCellEl) targetCellEl = document.getElementById(`cell-${r}-${c}`);
                if(grid[r][c] === targetKey1 && mission[targetKey1] > 0) mission[targetKey1]--;
                if(grid[r][c] === targetKey2 && mission[targetKey2] > 0) mission[targetKey2]--;
                grid[r][c] = null; removedCount++;
            }
        }
    }

    spawnSpecialList.forEach(item => {
        grid[item.r][item.c] = item.type;
        let cellSpan = document.getElementById(`cell-${item.r}-${item.c}`);
        if(item.type === CASTLE) showBonusEffect(cellSpan, "🏯 古城生成", true);
        if(item.type === TORII) showBonusEffect(cellSpan, "⛩️ 鳥居生成", true);
    });

    let addedTime = spawnSpecialList.length > 0 ? 5.0 : 2.0; 
    timeLeft = Math.min(maxTime, timeLeft + addedTime); 
    if(targetCellEl) showBonusEffect(targetCellEl, `+${addedTime.toFixed(0)}s`);

    score += removedCount * (80 + currentComboCount * 40);
    
    let scoreEl = document.getElementById("score");
    scoreEl.innerText = score;
    scoreEl.style.transform = "scale(1.3)";
    setTimeout(() => scoreEl.style.transform = "scale(1)", 150);

    setTimeout(drop, 250);
}

function drop(){
    let len = currentLevelTypes.length;
    for(let c=0; c<SIZE; c++) {
        let pointer = SIZE - 1;
        for(let r=SIZE-1; r>=0; r--) { if(grid[r][c] !== null) { grid[pointer][c] = grid[r][c]; pointer--; } }
        while(pointer >= 0) { grid[pointer][c] = currentLevelTypes[Math.floor(Math.random() * len)]; pointer--; }
    }
    render();
    setTimeout(() => {
        let matched = checkMatchesAndEliminate();
        if(matched) { 
            currentComboCount++; 
            renderMission(); 
        }
        else { isAnimating = false; checkGameStatus(false); if(countPossibleMoves(grid) < 1 && !isLocalGameOver()) { grid = generateValidGrid(); render(); } }
    }, 200);
}

function renderMission() {
    const missionEl = document.getElementById("mission"); if(!targetKey1 || !targetKey2) return;
    
    missionEl.innerHTML = `<div>🔥 廚房急單：${MASTER_ITEMS[targetKey1].text} × ${mission[targetKey1]} ｜ ${MASTER_ITEMS[targetKey2].text} × ${mission[targetKey2]}</div>`;
    
    if(currentComboCount > 1) {
        comboBadge.innerText = `🔥 COMBO x${currentComboCount}`;
        comboBadge.classList.add("combo-active");
    } else {
        comboBadge.classList.remove("combo-active");
    }
}

function checkGameStatus(timeOut = false) {
    if (mission[targetKey1] <= 0 && mission[targetKey2] <= 0) {
        clearInterval(timerInterval); currentLevel++; setupLevel(); return;
    } 
    if (moves <= 0 || timeOut) { 
        clearInterval(timerInterval); stopBGM(); 
        document.getElementById("go-reason-text").innerText = timeOut ? "⏰ 出餐超時！客人走光了…" : "💸 步數耗盡！差一點就完成！";
        document.getElementById("go-level-val").innerText = `第 ${currentLevel} 關`;
        document.getElementById("go-score-val").innerText = score;
        document.getElementById("gameOverModal").style.display = "flex"; 
    }
}

function watchAdRevive() {
    alert("🎬 正在載入廣告影片...\n【廣告播放完畢】成功獲得健康愛心！");
    document.getElementById("gameOverModal").style.display = "none";
    moves = 10; 
    timeLeft = 30; 
    document.getElementById("moves").innerText = moves;
    startTimer();
    if(audioCtx && !musicUserToggled) startBGM();
}

function restartWholeGame() { document.getElementById("gameOverModal").style.display = "none"; currentLevel = 1; score = 0; document.getElementById("score").innerText = score; setupLevel(); }
function returnToGameHome() { document.getElementById("gameOverModal").style.display = "none"; currentLevel = 1; score = 0; document.getElementById("score").innerText = score; setupLevel(); }

function updateRescueUI() {
    rescueIconsEl.innerText = `剩 ${rescueMovesLeft} 次`;
    if(rescueMovesLeft <= 0) { ambulanceBtn.disabled = true; }
}

function useAmbulanceRescue() {
    resetUserInactivityTimer(); if(rescueMovesLeft <= 0 || isAnimating || isLocalGameOver()) return;
    rescueMovesLeft--; updateRescueUI(); grid = generateValidGrid(); render();
    setTimeout(() => { triggerSearchAndShowHint(); }, 300);
}

function setupLevel() {
    let poolSize = currentLevel >= 15 ? 8 : (currentLevel >= 6 ? 6 : 4);
    
    let allKeys = Object.keys(MASTER_ITEMS).filter(k => k !== CASTLE && k !== TORII);
    allKeys.sort(() => 0.5 - Math.random()); 
    currentLevelTypes = allKeys.slice(0, poolSize); 
    
    targetKey1 = currentLevelTypes[0]; 
    targetKey2 = currentLevelTypes[1];
    let targetCount = Math.min(30, 8 + Math.floor(currentLevel / 2)); 
    mission = { [targetKey1]: targetCount, [targetKey2]: targetCount };
    
    moves = Math.min(50, 35 + Math.floor(currentLevel / 5)); 
    document.getElementById("moves").innerText = moves; 
    document.getElementById("current-level").innerText = currentLevel;
    
    isAnimating = false; last = null; rescueMovesLeft = 3; ambulanceBtn.disabled = false; updateRescueUI(); resetUserInactivityTimer();
    grid = generateValidGrid(); 
    render(); 
    startTimer(); 
    if(audioCtx && !musicUserToggled) startBGM();
}

window.onload = function() { 
    if(!localStorage.getItem("dailyReward") || Date.now() - localStorage.getItem("dailyReward") > 24 * 60 * 60 * 1000){
        alert("🎁 歡迎回到壽司坊！今日登入獎勵 +50 金幣！已自動存入錢包。");
        localStorage.setItem("dailyReward", Date.now());
    }
    setupLevel(); 
};
</script>
