<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sushi Pop 壽司彈彈樂 VIP ✨</title>

<style>
body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden; 
    overscroll-behavior: none;
    transition: background 0.1s ease, filter 0.1s ease;
}

/* 🎯 ✅ 超爽滿屏版：頂底錨定防線，徹底免除 iPhone Bar 壓縮跳動 */
.container {
    width: 100vw;
    height: 100vh; /* 強制吃滿全屏 */
    max-width: 500px; /* 大機極限 */
    background: white;
    padding: 10px; /* 極窄安全邊距，擴大核心作戰區 */
    text-align: center;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 精準均勻分配，把棋盤和急單頂到最舒服的手指觸控區 */
    position: relative; 
}

h1 { font-size: 6vw; color: #ff6b6b; margin: 0; padding: 0; line-height: 1.1; }
@media screen and (min-width: 480px) { h1 { font-size: 26px; } }

.level-maps-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2vw;
    margin: 0;
    font-size: 11px;
    font-weight: bold;
    color: #7f8c8d;
}
.map-node { padding: 1px 6px; background: #e0e0e0; border-radius: 6px; transition: all 0.3s; }
.map-node.active { background: #ff6b6b; color: white; transform: scale(1.05); }

.stats { display: flex; justify-content: space-between; margin: 0; gap: 4px; }
.stat-box {
    background: #f7f7f7; border-radius: 12px; padding: 4px 2px;
    width: 19%; font-size: 11px; font-weight: bold; color: #4a3728;
    box-sizing: border-box; line-height: 1.2;
}
.stat-box span { color: #ff6b6b; }

.timer-container {
    width: 100%; background: #eddcc9; height: 8px; border-radius: 4px;
    margin: 0; overflow: hidden; position: relative; border: 1px solid #4a3728;
}
.timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff6b6b, #ff4d4d); transition: width 0.1s linear; }

#mission {
    background: #fff7e6; border-radius: 12px; margin: 0;
    font-size: 14px; font-weight: bold; color: #2c3e50; border: 1px solid #f1c40f;
    display: flex; justify-content: center; align-items: center; height: 38px; box-sizing: border-box;
}

.combo-floating-badge {
    position: absolute; top: 15%; right: 15px;
    background: linear-gradient(135deg, #ff4d4d, #ff6b6b); color: white;
    padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 900;
    box-shadow: 0 4px 8px rgba(255,61,61,0.3); z-index: 999;
    opacity: 0; transform: scale(0.8); transition: all 0.1s ease;
}
.combo-active { opacity: 1; transform: scale(1); }

.shop-panel { display: flex; justify-content: space-between; gap: 4px; margin: 0; }
.shop-item {
    flex: 1; background: #fff2e6; border: 1px dashed #e67e22; border-radius: 8px;
    padding: 4px 2px; font-size: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s;
}
.shop-item.bought { background: #e67e22; color: white; border-style: solid; }

.skills-panel { display: flex; justify-content: space-between; gap: 6px; margin: 0; }
.btn-ambulance {
    background: linear-gradient(135deg, #a2ebd2, #8edeb4); color: #27ae60; border: 2px solid #27ae60; 
    font-size: 12px; font-weight: bold; border-radius: 12px; width: 50%; height: 34px; cursor: pointer;
}
.btn-ambulance:disabled { background: #95a5a6!important; border: none; opacity: 0.6; color: #fff!important; }
.btn-megabomb {
    background: linear-gradient(135deg, #fcd2b6, #fca68a); color: #d35400; border: 2px solid #d35400; 
    font-size: 12px; font-weight: bold; border-radius: 12px; width: 50%; height: 34px; cursor: pointer;
}

.board-container { width: 100%; display: flex; justify-content: center; }

/* 🔥 ✅ 超爽滿屏版：極致滿版正方形棋盤佈局 */
.board {
    display: grid; 
    grid-template-columns: repeat(8, 1fr); 
    gap: 4px; 
    background: #ffffff; 
    padding: 6px; 
    border-radius: 16px; 
    border: 3px solid #4a3728;
    touch-action: none !important; 
    
    width: 95vw; 
    height: 95vw;
    max-width: 480px; 
    max-height: 480px; 
    box-sizing: border-box;
}

.cell {
    width: 100%; height: 100%; background: #fdfdfd; border-radius: 18%;
    position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
    box-sizing: border-box;
    overflow: hidden; 
    transition: transform 0.22s cubic-bezier(0.25, 1, 0.5, 1);
}
.selected { border: 3px solid #e74c3c !important; background: #fff0f0 !important; }
.auto-hint-flash { border: 2px solid #f1c40f !important; background-color: #fef5c8 !important; }

/* 🔥 ✅ 超爽滿屏版：壽司飽滿度極致升級比例 */
.disk-emoji { 
    font-size: 7.5vw; 
    line-height: 1; 
    pointer-events: none; 
    display: inline-block;
    transition: transform 0.1s ease; 
}

@media screen and (min-width: 420px) { 
    .disk-emoji { font-size: 30px; } 
}

/* 彈窗 */
.game-over-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center;
}
.game-over-content { background: white; width: 85%; max-width: 340px; border-radius: 20px; padding: 20px; text-align: center; }
.fail-box { background: #ffe6e6; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; }
.highlight { color: #ff4d4d; font-weight: bold; }
button.menu-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; }

.time-bonus-text, .combo-bonus-text {
    position: absolute; font-weight: 900; pointer-events: none; z-index: 1005;
    animation: floatUpUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}
.time-bonus-text { color: #2ecc71; font-size: 18px; text-shadow: 1px 1px 0px #fff; }
.combo-bonus-text { color: #e67e22; font-size: 24px; text-shadow: 2px 2px 0px #fff; text-align: center; width: 160px; }
@keyframes floatUpUp {
    0% { transform: translate(0, 0) scale(0.7); opacity: 1; }
    50% { transform: translate(0, -20px) scale(1.2); opacity: 1; }
    100% { transform: translate(0, -50px) scale(0.9); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <div id="combo-badge" class="combo-floating-badge">🔥 COMBO x2</div>

    <h1>🍣 Sushi Pop 壽司彈彈樂 VIP ✨</h1>
    <div style="font-size:11px; color:#999;">全港熱玩🔥 100% Full-Screen 滿全版流暢防抖版</div>
    
    <div class="level-maps-bar" id="map-bar">
        <span class="map-node active" id="node-curr">Lv.1</span> ➔ 
        <span class="map-node" id="node-next1">Lv.2</span> ➔ 
        <span class="map-node" id="node-next2">Lv.3</span> ➔ 
        <span class="map-node" id="node-next3">🔒 Lv.4</span>
    </div>

    <div class="shop-panel">
        <div class="shop-item" id="shop-moves" onclick="buyBuff('moves', 20)">👣 +5步 (20🪙)</div>
        <div class="shop-item" id="shop-time" onclick="buyBuff('time', 15)">⏳ +10秒 (15🪙)</div>
        <div class="shop-item" id="shop-double" onclick="buyBuff('double', 30)">✨ 雙倍分 (30🪙)</div>
    </div>

    <div class="stats">
        <div class="stat-box">⏳ 時間<br><span id="timer-text">90s</span></div>
        <div class="stat-box">👣 步數<br><span id="moves">35</span></div>
        <div class="stat-box">🏆 得分<br><span id="score">0</span></div>
        <div class="stat-box">🪙 金幣<br><span id="coin">0</span></div>
        <div class="stat-box" style="width:16%; font-size:10px;">👑 最高<br><span id="best-score-ui">0</span></div>
    </div>

    <div class="timer-container">
        <div id="timer-bar" class="timer-bar"></div>
    </div>

    <div id="mission">🔥 任務載入中...</div>

    <div class="skills-panel">
        <button id="ambulance-btn" class="btn-ambulance" onclick="useAmbulanceRescue()">
            ⚡ 緊急整理：<span id="rescue-icons">3</span>
        </button>
        <button id="megabomb-btn" class="btn-megabomb" onclick="useMegaBomb()">
            💣 江戶炸彈 (20🪙)
        </button>
    </div>

    <div class="board-container">
        <div id="board" class="board"></div>
    </div>
</div>

<div id="gameOverModal" class="game-over-modal">
    <div class="game-over-content">
        <div class="fail-box">
            <h3 style="margin-top:0; color:#ff6b6b; text-align:center;" id="go-title-text">💥 訂單爆單失敗！</h3>
            <p id="go-reason-text">💸 步數耗盡！差一點就完成！</p>
            <p>卡關：<span id="go-level-val">第 1 關</span></p>
            <p class="highlight">連勝紀錄：<span id="go-streak-val">0</span> 🌟</p>
            <p class="highlight">最終分數：<span id="go-score-val">0</span> 分</p>
        </div>
        <button id="boost-revive-btn" class="menu-btn" style="background:#e74c3c; color:white; display:none;" onclick="useAlmostWinBoost()">💎 買5步+10秒 (10金幣!)</button>
        <button class="menu-btn" style="background:#f1c40f; color:#4a3728;" onclick="reviveWithCoins()">🪙 30 金幣復活</button>
        <button class="menu-btn" style="background:#2ecc71; color:white;" onclick="watchAdRevive()">❤️ 看廣告繼續</button>
        <button class="menu-btn retry" onclick="restartWholeGame()">🔄 再挑戰一次</button>
        <button class="menu-btn home" onclick="returnToGameHome()">🏠 返回首頁</button>
    </div>
</div>

<script>
const SIZE = 8;

const MASTER_ITEMS = {
    "salmon_sushi": { text: "🍣" },
    "prawn_sushi": { text: "🍤" },
    "fish_rice": { text: "🍙" },
    "temaki": { text: "🌯" }, 
    "fish_plate": { text: "🐟" },
    "octopus": { text: "🐙" },
    "crab_claw": { text: "🦀" },
    "green_tea": { text: "🍵" },
    "power_row": { text: "🔥" },
    "power_bomb": { text: "💥" },
    "power_color": { text: "🌈" }
};

let currentLevelTypes = [], grid = [], score = 0, last = null, isAnimating = false;
let currentLevel = 1, moves = 35, maxTime = 90, timeLeft = 90, timerInterval = null, musicUserToggled = false;
let rescueMovesLeft = 3; 
let mission = {}, targetKey1 = "", targetKey2 = "", missionType = "collect"; 
let reviveUsed = false, winStreak = 0, maxComboThisRound = 1, lastHintTime = 0, userLastActiveTime = Date.now();

let currentComboCount = 1;
let comboTimer = null;
let activeBuffs = { moves: false, time: false, double: false };

const board = document.getElementById("board");
const timerBar = document.getElementById("timer-bar");
const timerTextEl = document.getElementById("timer-text");
const ambulanceBtn = document.getElementById("ambulance-btn");
const rescueIconsEl = document.getElementById("rescue-icons");
const comboBadge = document.getElementById("combo-badge");

let hintLoop = null;

function isLocalGameOver() { return moves <= 0 || timeLeft <= 0; }
function resetUserInactivityTimer() { userLastActiveTime = Date.now(); }

let coins = parseInt(localStorage.getItem("coins") || "100"); 
let bestScore = parseInt(localStorage.getItem("bestScore") || "0");

function updateCoins(){
    localStorage.setItem("coins", coins);
    document.getElementById("coin").innerText = coins;
}

function vibrate(ms=30){ if(navigator.vibrate) navigator.vibrate(ms); }

// ===== 🔊 音訊引擎 =====
let audioCtx = null, bgmTimer = null, bgmStep = 0;
const EASON_MELODY = [329.63, 349.23, 392.00, 523.25, 440.00, 392.00, 349.23, 392.00, 440.00];

function tryInitAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function startBGM() {
    if (!audioCtx) return;
    if (bgmTimer) clearInterval(bgmTimer);
    bgmTimer = setInterval(() => {
        if (isLocalGameOver() || musicUserToggled || !audioCtx) return;
        try {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(EASON_MELODY[bgmStep % EASON_MELODY.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
            osc.start(); osc.stop(audioCtx.currentTime + 0.22); bgmStep++;
        } catch(e){}
    }, 280);
}
function stopBGM() { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } }

function safePlaySound(type) {
    tryInitAudio();
    if (!audioCtx || musicUserToggled) return;
    try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        if (type === 'match') {
            osc.type = 'sine'; 
            let pitchFreq = 523.25 * (1 + (currentComboCount - 1) * 0.12);
            osc.frequency.setValueAtTime(pitchFreq, now);
            gain.gain.setValueAtTime(0.12, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        } else if (type === 'boom') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(160, now); osc.frequency.linearRampToValueAtTime(35, now + 0.45);
            gain.gain.setValueAtTime(0.28, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
        } else if (type === 'wrong') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(110, now);
            gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
        }
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(now + 0.45);
    } catch(e){}
}

function startTimer() {
    clearInterval(timerInterval);
    maxTime = Math.max(30, 90 - (currentLevel - 1) * 2); 
    if (activeBuffs.time) maxTime += 10; 
    timerInterval = setInterval(() => {
        if (isAnimating) return; 
        timeLeft -= 0.1;
        if (timeLeft <= 0) { timeLeft = 0; clearInterval(timerInterval); checkGameStatus(true); }
        timerBar.style.width = (timeLeft / maxTime) * 100 + "%";
        timerTextEl.innerText = `${Math.max(0, timeLeft).toFixed(0)}s`;
    }, 100);
}

function showBonusEffect(cell, text, isCombo = false) {
    let bonusText = document.createElement("div");
    bonusText.className = isCombo ? "combo-bonus-text" : "time-bonus-text"; 
    bonusText.innerText = text;
    if (cell) {
        const rect = cell.getBoundingClientRect();
        bonusText.style.left = (rect.left + window.scrollX + cell.offsetWidth / 2 - 20) + "px";
        bonusText.style.top = (rect.top + window.scrollY + cell.offsetHeight / 2 - 15) + "px";
    } else {
        bonusText.style.left = "calc(50% - 80px)"; bonusText.style.top = "35%";
    }
    document.body.appendChild(bonusText); setTimeout(() => bonusText.remove(), 800);
}

function buyBuff(type, cost) {
    if (activeBuffs[type]) return; 
    if (coins < cost) { alert("⚠️ 金幣不足！"); return; }
    coins -= cost; activeBuffs[type] = true; updateCoins();
    document.getElementById(`shop-${type}`).classList.add("bought");
    if(type === 'moves') { moves += 5; document.getElementById("moves").innerText = moves; }
}
function clearShopUI() {
    activeBuffs = { moves: false, time: false, double: false };
    document.querySelectorAll(".shop-item").forEach(el => el.classList.remove("bought"));
}

function create(){
    let g; let len = currentLevelTypes.length;
    for (let attempts=0; attempts<300; attempts++) {
        g = [];
        for(let r=0; r<SIZE; r++){
            let row=[]; for(let c=0; c<SIZE; c++) row.push(currentLevelTypes[Math.floor(Math.random()*len)]);
            g.push(row);
        }
        if (!hasMatch(g)) return g;
    }
    return g;
}

function hasMatch(g){
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(c<=SIZE-3 && g[r][c] && g[r][c]===g[r][c+1] && g[r][c]===g[r][c+2]) return true;
            if(r<=SIZE-3 && g[r][c] && g[r][c]===g[r+1][c] && g[r][c]===g[r+2][c]) return true;
        }
    }
    return false;
}

function countPossibleMoves(g){
    let count = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            let dirs=[[0,1],[1,0]];
            for(let [dr,dc] of dirs){
                let nr=r+dr, nc=c+dc;
                if(nr<SIZE && nc<SIZE){
                    [g[r][c],g[nr][nc]]=[g[nr][nc],g[r][c]];
                    if(hasMatch(g)) count++;
                    [g[r][c],g[nr][nc]]=[g[nr][nc],g[r][c]]; 
                }
            }
        }
    }
    return count;
}

function generateValidGrid() {
    let g; do { g = create(); } while (countPossibleMoves(g) < 1); return g;
}

function render(){
    board.innerHTML=""; renderMission();
    grid.forEach((row,r)=>{
        row.forEach((cell,c)=>{
            let div = document.createElement("div"); div.className = "cell"; div.id = `cell-${r}-${c}`;
            div.dataset.r = r; div.dataset.c = c;
            if(last && last.r === r && last.c === c) div.classList.add("selected");
            if(cell){
                let span = document.createElement("span"); span.className = "disk-emoji";
                span.innerText = MASTER_ITEMS[cell].text;
                div.appendChild(span);
            }
            board.appendChild(div);
        });
    });
}

function clearAutoHints() {
    for(let r=0; r<SIZE; r++) {
        for(let c=0; c<SIZE; c++) { document.getElementById(`cell-${r}-${c}`)?.classList.remove("auto-hint-flash"); }
    }
}

function triggerSearchAndShowHint() {
    if (isAnimating || isLocalGameOver() || currentLevelTypes.length === 0) return;
    clearAutoHints();
    let bestMove = null; let bestScoreVal = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            let dirs=[[0,1],[1,0]];
            for(let [dr,dc] of dirs){
                let nr=r+dr, nc=c+dc;
                if(nr<SIZE && nc<SIZE){
                    [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]];
                    let scoreEstimate = estimateMatchScore(grid);
                    [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]]; 
                    if(scoreEstimate > bestScoreVal){ bestScoreVal = scoreEstimate; bestMove = {r, c, nr, nc}; }
                }
            }
        }
    }
    if(bestMove){
        let id1 = `cell-${bestMove.r}-${bestMove.c}`, id2 = `cell-${bestMove.nr}-${bestMove.nc}`;
        document.getElementById(id1)?.classList.add("auto-hint-flash");
        document.getElementById(id2)?.classList.add("auto-hint-flash");
    }
}

function estimateMatchScore(g){
    let count = 0;
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE-2; c++){ if(g[r][c] && g[r][c] === g[r][c+1] && g[r][c] === g[r][c+2]) count += 3; }
    }
    for(let c=0; c<SIZE; c++){
        for(let r=0; r<SIZE-2; r++){ if(g[r][c] && g[r][c] === g[r+1][c] && g[r][c] === g[r+2][c]) count += 3; }
    }
    return count;
}

function startHintLoop() {
    clearInterval(hintLoop);
    hintLoop = setInterval(() => { 
        if(Date.now() - userLastActiveTime > 8000 && Date.now() - lastHintTime > 15000) {
            if(Math.random() < 0.6) { triggerSearchAndShowHint(); lastHintTime = Date.now(); }
        }
    }, 1000);
}

board.addEventListener("pointerdown", e => {
    tryInitAudio(); resetUserInactivityTimer();
    if(isAnimating || isLocalGameOver()) return;
    let clickedCell = e.target.closest(".cell");
    if(!clickedCell) return;
    
    let r = parseInt(clickedCell.dataset.r), c = parseInt(clickedCell.dataset.c);
    if(grid[r][c] && grid[r][c].startsWith("power_")) {
        triggerPowerUpExplosion(r, c, grid[r][c]);
        return;
    }
    last = clickedCell;
    render();
});

board.addEventListener("pointermove", e => {
    if(!last || isAnimating) return;
    let targetEl = document.elementFromPoint(e.clientX, e.clientY);
    let currentCell = targetEl ? targetEl.closest(".cell") : null;
    if(!currentCell || last === currentCell) return;

    let r1 = parseInt(last.dataset.r), c1 = parseInt(last.dataset.c);
    let r2 = parseInt(currentCell.dataset.r), c2 = parseInt(currentCell.dataset.c);
    
    if(Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1) {
        isAnimating = true; last = null;
        executeUserMove(r1, c1, r2, c2);
    }
});

function executeUserMove(r1, c1, r2, c2) {
    clearAutoHints();
    [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
    render();

    setTimeout(() => {
        let success = checkMatchesAndEliminate(r2, c2); 
        if(!success) {
            [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
            safePlaySound('wrong'); isAnimating = false; render();
        } else {
            increaseCombo(); 
            moves--; document.getElementById("moves").innerText = moves;
        }
    }, 200);
}

function increaseCombo() {
    clearTimeout(comboTimer);
    currentComboCount++;
    if(currentComboCount > maxComboThisRound) maxComboThisRound = currentComboCount;
    
    if(currentComboCount >= 4){
        document.body.style.filter = "brightness(1.25)";
        setTimeout(() => { document.body.style.filter = "brightness(1)"; }, 120);
    }
    
    comboTimer = setTimeout(() => { currentComboCount = 1; renderMission(); }, 2000); 
}

function checkMatchesAndEliminate(pivotR = -1, pivotC = -1) {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    let hasMatchFound = false;
    let matchSizes = [];

    for(let r=0; r<SIZE; r++){
        let matchLen = 1; let matchStart = 0;
        for(let c=1; c<SIZE; c++){
            if(grid[r][c] && grid[r][c] === grid[r][c-1] && !grid[r][c].startsWith("power_")) matchLen++;
            else {
                if(matchLen >= 3) {
                    hasMatchFound = true; matchSizes.push({len: matchLen, type: 'h', r: r, startC: matchStart});
                    for(let i=matchStart; i<c; i++) toRemove[r][i] = true;
                }
                matchLen = 1; matchStart = c;
            }
        }
        if(matchLen >= 3) {
            hasMatchFound = true; matchSizes.push({len: matchLen, type: 'h', r: r, startC: matchStart});
            for(let i=matchStart; i<SIZE; i++) toRemove[r][i] = true;
        }
    }

    for(let c=0; c<SIZE; c++){
        let matchLen = 1; let matchStart = 0;
        for(let r=1; r<SIZE; r++){
            if(grid[r][c] && grid[r][c] === grid[r-1][c] && !grid[r][c].startsWith("power_")) matchLen++;
            else {
                if(matchLen >= 3) {
                    hasMatchFound = true; matchSizes.push({len: matchLen, type: 'v', c: c, startR: matchStart});
                    for(let i=matchStart; i<r; i++) toRemove[i][c] = true;
                }
                matchLen = 1; matchStart = r;
            }
        }
        if(matchLen >= 3) {
            hasMatchFound = true; matchSizes.push({len: matchLen, type: 'v', c: c, startR: matchStart});
            for(let i=matchStart; i<SIZE; i++) toRemove[i][c] = true;
        }
    }

    if(hasMatchFound){
        safePlaySound('match');
        executeElimination(toRemove, pivotR, pivotC, matchSizes);
        return true;
    }
    return false;
}

function triggerPowerUpExplosion(r, c, powerType) {
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    safePlaySound('boom'); vibrate(60);
    
    if (powerType === 'power_row') {
        for(let i=0; i<SIZE; i++) if(grid[r][i]) toRemove[r][i] = true;
        showBonusEffect(document.getElementById(`cell-${r}-${c}`), "🔥 ROW CLEAR!");
    } else if (powerType === 'power_bomb') {
        for(let i=Math.max(0, r-1); i<=Math.min(SIZE-1, r+1); i++){
            for(let j=Math.max(0, c-1); j<=Math.min(SIZE-1, j+1); j++){
                if(grid[i][j]) toRemove[i][j] = true;
            }
        }
        showBonusEffect(document.getElementById(`cell-${r}-${c}`), "💥 BOMB!");
    } else if (powerType === 'power_color') {
        let normalTypes = currentLevelTypes.filter(t => !t.startsWith("power_"));
        let targetType = normalTypes[Math.floor(Math.random() * normalTypes.length)];
        for(let i=0; i<SIZE; i++){
            for(let j=0; j<SIZE; j++){ if(grid[i][j] === targetType) toRemove[i][j] = true; }
        }
        showBonusEffect(document.getElementById(`cell-${r}-${c}`), "🌈 COLOR BLAST!");
    }
    
    increaseCombo();
    executeElimination(toRemove);
}

function executeElimination(toRemove, pivotR = -1, pivotC = -1, matchSizes = []) {
    let removedCount = 0; let targetCellEl = null;
    
    for(let r=0; r<SIZE; r++){
        for(let c=0; c<SIZE; c++){
            if(toRemove[r][c] && grid[r][c]) {
                if(!targetCellEl) targetCellEl = document.getElementById(`cell-${r}-${c}`);
                if(targetKey1 && grid[r][c] === targetKey1 && mission[targetKey1] > 0) mission[targetKey1] = Math.max(0, mission[targetKey1] - 1);
                if(targetKey2 && grid[r][c] === targetKey2 && mission[targetKey2] > 0) mission[targetKey2] = Math.max(0, mission[targetKey2] - 1);
                grid[r][c] = null; removedCount++;
            }
        }
    }

    if(pivotR !== -1 && pivotC !== -1) {
        matchSizes.forEach(m => {
            if(m.len === 4) grid[pivotR][pivotC] = "power_row";
            else if(m.len === 5) grid[pivotR][pivotC] = "power_bomb";
            else if(m.len >= 6) grid[pivotR][pivotC] = "power_color";
        });
    }

    if(removedCount >= 4){
        document.querySelectorAll(".disk-emoji").forEach(e => {
            e.style.transform = "scale(1.22)";
            setTimeout(() => { e.style.transform = "scale(1)"; }, 120);
        });
        vibrate(25);
    }

    let addedTime = 2.0; timeLeft = Math.min(maxTime, timeLeft + addedTime); 
    let baseScore = removedCount * 80 * currentComboCount;
    if (activeBuffs.double) baseScore *= 2; 
    score += Math.floor(baseScore);
    
    if(score > bestScore){ bestScore = score; localStorage.setItem("bestScore", bestScore); }
    document.getElementById("score").innerText = score;

    setTimeout(drop, 220);
}

function drop() {
    let len = currentLevelTypes.length;
    for(let c=0; c<SIZE; c++) {
        let pointer = SIZE - 1;
        for(let r=SIZE-1; r>=0; r--) {
            if(grid[r][c] !== null) { grid[pointer][c] = grid[r][c]; pointer--; }
        }
        while(pointer >= 0) {
            grid[pointer][c] = currentLevelTypes[Math.floor(Math.random() * len)];
            let cellEl = document.getElementById(`cell-${pointer}-${c}`);
            if(cellEl) {
                cellEl.style.transform = "translateY(-25px)";
                setTimeout(() => { cellEl.style.transform = "translateY(0)"; }, 60);
            }
            pointer--;
        }
    }
    render();
    setTimeout(() => {
        let matched = checkMatchesAndEliminate();
        if(matched) { increaseCombo(); renderMission(); }
        else { 
            isAnimating = false; checkGameStatus(false); 
            if(countPossibleMoves(grid) < 1 && !isLocalGameOver()) { grid = generateValidGrid(); render(); } 
        }
    }, 220);
}

function renderMission() {
    const missionEl = document.getElementById("mission"); 
    if(!targetKey1 || !targetKey2) return;
    
    if(missionType === "combo") {
        missionEl.innerHTML = `<div>🎯 關卡目標：達成 1 次 4 連擊以上！(目前最高: ${maxComboThisRound})</div>`;
    } else {
        missionEl.innerHTML = `<div>🔥 廚房急單：${MASTER_ITEMS[targetKey1].text} × ${mission[targetKey1]} ｜ ${MASTER_ITEMS[targetKey2].text} × ${mission[targetKey2]}</div>`;
    }
    
    if(currentComboCount > 1) {
        comboBadge.innerText = `🔥 COMBO x${currentComboCount}`;
        comboBadge.classList.add("combo-active");
        
        if(currentComboCount === 3) showBonusEffect(null, "🔥 GOOD!", true);
        if(currentComboCount === 4) showBonusEffect(null, "✨ GREAT!", true);
        if(currentComboCount >= 5) showBonusEffect(null, "👑 AMAZING!", true);

        clearTimeout(comboBadge.hideTimer);
        comboBadge.hideTimer = setTimeout(() => { comboBadge.classList.remove("combo-active"); }, 800); 
    }
}

function checkGameStatus(timeOut = false) {
    let isWin = false;
    if(missionType === "combo") {
        if(maxComboThisRound >= 4) isWin = true;
    } else {
        let remaining = mission[targetKey1] + mission[targetKey2];
        if(remaining <= 0) isWin = true;
    }

    if (isWin) {
        clearInterval(timerInterval); winStreak++; 
        coins += (maxComboThisRound >= 5) ? 50 : 25; updateCoins();
        setTimeout(() => {
            alert(`🎉 順利通關！完成第 ${currentLevel} 關！\n連勝紀錄達 ${winStreak} 🔥`);
            currentLevel++; clearShopUI(); setupLevel();
        }, 200);
        return;
    } 
    
    if (moves <= 0 || timeOut) { 
        clearInterval(timerInterval); stopBGM(); 
        document.getElementById("go-level-val").innerText = `第 ${currentLevel} 關`;
        document.getElementById("go-streak-val").innerText = winStreak;
        document.getElementById("go-score-val").innerText = score;
        document.getElementById("boost-revive-btn").style.display = "block"; 
        winStreak = 0; clearShopUI();
        document.getElementById("gameOverModal").style.display = "flex"; 
    }
}

function useAlmostWinBoost(){
    if(coins < 10) { alert("⚠️ 金幣不足！"); return; }
    coins -= 10; updateCoins();
    grid = generateValidGrid(); 
    document.getElementById("gameOverModal").style.display = "none";
    moves = 5; timeLeft = 15; document.getElementById("moves").innerText = moves;
    render(); startTimer();
    if(audioCtx && !musicUserToggled) startBGM();
}

function reviveWithCoins(){
    if(coins < 30){ alert("⚠️ 金幣不足！"); return; }
    coins -= 30; updateCoins();
    grid = generateValidGrid();
    document.getElementById("gameOverModal").style.display = "none";
    moves = 8; timeLeft = 25; document.getElementById("moves").innerText = moves;
    render(); startTimer();
    if(audioCtx && !musicUserToggled) startBGM();
}

function watchAdRevive() {
    alert("🎬 廣告播放完畢！");
    grid = generateValidGrid();
    document.getElementById("gameOverModal").style.display = "none";
    moves = 8; timeLeft = 25; document.getElementById("moves").innerText = moves;
    render(); startTimer();
    if(audioCtx && !musicUserToggled) startBGM();
}

function useMegaBomb() {
    if(isAnimating || isLocalGameOver()) return;
    if(coins < 20) { alert("⚠️ 金幣不足！"); return; }
    coins -= 20; updateCoins(); vibrate(80); safePlaySound('boom');
    let toRemove = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    for(let r=2; r<6; r++) { for(let c=2; c<6; c++) toRemove[r][c] = true; } 
    isAnimating = true; executeElimination(toRemove);
}

function useAmbulanceRescue() {
    if(rescueMovesLeft <= 0 || isAnimating || isLocalGameOver()) return;
    rescueMovesLeft--; rescueIconsEl.innerText = rescueMovesLeft;
    grid = generateValidGrid(); render();
}

function restartWholeGame() { document.getElementById("gameOverModal").style.display = "none"; currentLevel = 1; score = 0; setupLevel(); }
function returnToGameHome() { document.getElementById("gameOverModal").style.display = "none"; currentLevel = 1; score = 0; setupLevel(); }

function updateMapUI() {
    let nodes = ["node-curr", "node-next1", "node-next2", "node-next3"];
    nodes.forEach(id => { document.getElementById(id).classList.remove("active"); });
    document.getElementById("node-curr").classList.add("active");
}

function setupLevel() {
    maxComboThisRound = 1; currentComboCount = 1;
    missionType = (currentLevel % 2 === 0) ? "combo" : "collect";

    let poolSize = currentLevel >= 12 ? 8 : (currentLevel >= 6 ? 6 : 4);
    let allKeys = Object.keys(MASTER_ITEMS).filter(k => !k.startsWith("power_"));
    allKeys.sort(() => 0.5 - Math.random()); 
    currentLevelTypes = allKeys.slice(0, poolSize); 
    
    targetKey1 = currentLevelTypes[0]; targetKey2 = currentLevelTypes[1];
    let targetCount = Math.min(50, 8 + Math.floor(currentLevel * 1.5)); 
    mission = { [targetKey1]: targetCount, [targetKey2]: targetCount };
    
    moves = Math.min(45, 30 + Math.floor(currentLevel / 4));
    if (activeBuffs.moves) moves += 5; 
    
    document.getElementById("moves").innerText = moves; 
    document.getElementById("node-curr").innerText = `Lv.${currentLevel}`;
    document.getElementById("node-next1").innerText = `Lv.${currentLevel + 1}`;
    document.getElementById("node-next2").innerText = `Lv.${currentLevel + 2}`;
    document.getElementById("node-next3").innerText = `🔒 Lv.${currentLevel + 3}`;

    document.getElementById("best-score-ui").innerText = bestScore;
    updateCoins();

    isAnimating = false; last = null; rescueMovesLeft = 3; rescueIconsEl.innerText = rescueMovesLeft;
    grid = generateValidGrid(); 
    render(); 
    startTimer();
    startHintLoop(); 
    if(audioCtx && !musicUserToggled) startBGM();
}

window.onload = function() { setupLevel(); };
</script>
